<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PACMAN GTA</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-wrapper">
    <div id="loading-screen">
      <div class="loading-content">
        <div class="logo-text">PACMAN<span>GTA</span></div>
        <div class="loading-bar-wrap"><div id="loading-bar"></div></div>
        <div class="loading-tip" id="loading-tip">Loading city...</div>
      </div>
    </div>
    <div id="start-screen" style="display:none">
      <div class="start-content">
        <div class="logo-big">PACMAN<span>GTA</span></div>
        <div class="tagline">Open World Crime. Pixel Style.</div>
        <button id="btn-new-game">NEW GAME</button>
        <button id="btn-load-game">CONTINUE</button>
        <div class="controls-hint">
          WASD: Move &nbsp;|&nbsp; SHIFT: Sprint &nbsp;|&nbsp; E: Vehicle &nbsp;|&nbsp; SPACE: Shoot
          <br>F: Melee &nbsp;|&nbsp; R: Reload &nbsp;|&nbsp; M: Minimap &nbsp;|&nbsp; 1-3: Weapons
        </div>
      </div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div id="hud" style="display:none">
      <div id="hud-topleft">
        <div class="bar-row"><span>HP</span><div class="bar-bg"><div id="bar-health" class="bar health-bar"></div></div></div>
        <div class="bar-row"><span>AR</span><div class="bar-bg"><div id="bar-armor" class="bar armor-bar"></div></div></div>
      </div>
      <div id="hud-topright">
        <div id="money-display">$<span id="hud-money">0</span></div>
        <div id="wanted-stars">
          <span class="star" id="star1">★</span>
          <span class="star" id="star2">★</span>
          <span class="star" id="star3">★</span>
          <span class="star" id="star4">★</span>
          <span class="star" id="star5">★</span>
        </div>
      </div>
      <div id="hud-bottom">
        <div id="weapon-display">
          <span id="weapon-name">FISTS</span>
          <span id="ammo-display"></span>
        </div>
      </div>
      <div id="minimap-container" style="display:none">
        <canvas id="minimapCanvas" width="150" height="150"></canvas>
      </div>
      <div id="mission-display" style="display:none">
        <div id="mission-title"></div>
        <div id="mission-obj"></div>
      </div>
      <div id="notification-area"></div>
    </div>
    <div id="shop-modal" style="display:none">
      <div class="modal-box">
        <h2>🏪 AMMU-NATION</h2>
        <div id="shop-items"></div>
        <button id="shop-close">CLOSE [ESC]</button>
      </div>
    </div>
    <div id="gameover-screen" style="display:none">
      <div class="gameover-content">
        <div class="gameover-title">WASTED</div>
        <div id="gameover-stats"></div>
        <button id="btn-respawn">RESPAWN ($100 fine)</button>
      </div>
    </div>
  </div>

  <script src="map.js"></script>
  <script src="physics.js"></script>
  <script src="economy.js"></script>
  <script src="weapons.js"></script>
  <script src="player.js"></script>
  <script src="npc.js"></script>
  <script src="vehicle.js"></script>
  <script src="police.js"></script>
  <script src="ai.js"></script>
  <script src="missions.js"></script>
  <script src="sound.js"></script>
  <script src="ui.js"></script>
  <script src="saveSystem.js"></script>
  <script src="game.js"></script>
  <script src="main.js"></script>
</body>
</html>
